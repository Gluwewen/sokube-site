# Global Hero Configuration
[params.hero]
  background = "bg-gradient-to-b from-neurokube-100 to-neurokube-50 dark:from-neurokube-900 dark:to-neurokube-900"

  [params.hero.style]
    title = "text-neurokube-900 dark:text-white"
    description = "text-gray-600 dark:text-neurokube-200"

    decoration_1 = "bg-neurokube-100 dark:bg-neurokube-800"
    decoration_2 = "bg-neurokube-200 dark:bg-neurokube-700"

  [params.hero.primary_button]
    background = "bg-neurokube-600"
    text_color = "text-white"
    hover = "hover:bg-neurokube-700"

  [params.hero.secondary_button]
    background = "bg-white dark:bg-neurokube-800"
    text_color = "text-neurokube-600 dark:text-neurokube-100"
    hover = "hover:bg-neurokube-100 dark:hover:bg-neurokube-700"
    border = "border-neurokube-600 dark:border-neurokube-400"

# Global CTA Configuration
[params.cta]
  enable = true

  [params.cta.style]
    background = "bg-neurokube-600"
    title = "text-white"
    description = "text-neurokube-100"

  [params.cta.primary_button]
    class = "bg-white text-neurokube-600 hover:bg-neurokube-200"
    background = "bg-white"
    text_color = "text-neurokube-600"
    hover = "hover:bg-neurokube-200"

#  [params.cta.secondary_button]
#    class = "border-white text-white hover:bg-neurokube-800"
#    text_color = "text-white"
#    hover = "hover:bg-neurokube-800"
#    border = "border-white"

# Section visibility toggles
[params.sections]
  testimonials = false
  clientLogos = false
  faq = true

# Pricing Configuration
[params.pricing]
  currency = "CHF"

  [params.pricing.style]
    card_background = "bg-neurokube-50 dark:bg-neurokube-800"
    card_border = "border-neurokube-300 dark:border-neurokube-700"
    featured_border = "border-neurokube-600 dark:border-neurokube-300"
    featured_shadow = "shadow-xl"
    icon_color = "text-neurokube-600 dark:text-neurokube-300"
    title_color = "text-gray-900 dark:text-white"
    description_color = "text-gray-500 dark:text-neurokube-200"
    price_color = "text-gray-900 dark:text-white"
    button_class = "btn-primary"

# Cards Configuration
[params.cards]
  grid_gap = "gap-8"

  # Palette existante — inchangée, reste le comportement par défaut
  [params.cards.default]
    background = "bg-gradient-to-br from-neurokube-100 to-neurokube-50 dark:from-neurokube-900 dark:to-neurokube-800"
    border = "border-neurokube-300 dark:border-neurokube-400"
    hover_border = "hover:border-neurokube-600 dark:hover:border-neurokube-400"
    label = "text-neurokube-600 dark:text-neurokube-300"
    title = "text-neurokube-900 dark:text-white"
    text = "text-gray-700 dark:text-gray-300"
    marker = "marker:text-neurokube-600 dark:marker:text-neurokube-300"

  # Nouvelle palette KUBE (ex: cartes "PROBLEME" de la page About)
  [params.cards.kube]
    background = "bg-gradient-to-br from-kube-100 to-kube-50 dark:from-kube-900 dark:to-kube-800"
    border = "border-kube-300 dark:border-kube-400"
    hover_border = "hover:border-kube-600 dark:hover:border-kube-400"
    label = "text-kube-600 dark:text-kube-300"
    title = "text-kube-900 dark:text-white"
    text = "text-gray-700 dark:text-gray-300"
    marker = "marker:text-kube-600 dark:marker:text-kube-300"

  # Nouvelle palette HR (réutilisable ailleurs si besoin)
  [params.cards.hr]
    background = "bg-gradient-to-br from-hr-100 to-hr-50 dark:from-hr-900 dark:to-hr-800"
    border = "border-hr-300 dark:border-hr-400"
    hover_border = "hover:border-hr-600 dark:hover:border-hr-400"
    label = "text-hr-600 dark:text-hr-300"
    title = "text-hr-900 dark:text-white"
    text = "text-gray-700 dark:text-gray-300"
    marker = "marker:text-hr-600 dark:marker:text-hr-300"

# Forms Configuration
[params.forms]

  [params.forms.style]
    container = "max-w-3xl mx-auto"
    input = "w-full rounded-xl border border-gray-300 dark:border-neurokube-700 dark:bg-neurokube-900 dark:text-white px-4 py-3"
    label = "block text-sm font-medium mb-2 text-gray-700 dark:text-neurokube-100"
    button = "btn btn-primary w-full"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.80.0"

[build]
  writeStats = true

[build.buildStats]
  enable = true

[security.funcs]
  getenv = ['^HUGO_', '^CI$']

[security.node.permissions]
  disable = true

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

