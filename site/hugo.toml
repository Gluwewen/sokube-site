      title = "Prêt à libérer le plein potentiel de votre équipe DevOps ?"
      description = "Rejoignez les entreprises qui utilisent déjà NeuroKube pour réduire la charge cognitive de leurs équipes DevOps."

    # French language for Blog
    [languages.fr.params.blog]
      title = "Retrouvez toute notre actualité à travers nos articles, études de cas …"
      subtitle = """
**Découvrez notre blog**.

Nous sommes ravis de partager avec vous nos derniers articles.
Que vous soyez à la recherche d'interviews, d'analyses ou d'avancées technologiques, vous trouverez ici de quoi satisfaire votre curiosité !
Nous espérons que vous prendrez autant de plaisir à lire nos articles que nous en avons eu à les écrire pour vous !
Poursuivez votre lecture pour découvrir comment le Cloud Native peut élargir vos horizons de développement.
"""

