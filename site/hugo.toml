# Global Hero Configuration
[params.hero]
  background = "bg-gradient-to-b from-neurokube-100 to-neurokube-50 dark:from-neurokube-900 dark:to-neurokube-900"

  [params.hero.style]
    title = "text-neurokube-900 dark:text-white"
    description = "text-gray-600 dark:text-neurokube-200"

    decoration_1 = "bg-neurokube-100 dark:bg-neurokube-800"
    decoration_2 = "bg-neurokube-200 dark:bg-neurokube-700"

  [params.hero.primary_button]
    background = "bg-neurokube-600"
    text_color = "text-white"
    hover = "hover:bg-neurokube-700"

  [params.hero.secondary_button]
    background = "bg-white dark:bg-neurokube-800"
    text_color = "text-neurokube-600 dark:text-neurokube-100"
    hover = "hover:bg-neurokube-100 dark:hover:bg-neurokube-700"
    border = "border-neurokube-600 dark:border-neurokube-400"

# Global CTA Configuration
[params.cta]
  enable = true

  [params.cta.style]
    background = "bg-neurokube-600"
    title = "text-white"
    description = "text-neurokube-100"
    # Default "Contact us" card background, when a page uses showContactBlock="true"
    # without specifying its own background in the .Inner YAML.
    contactBackground = "bg-white dark:bg-neurokube-900"

  [params.cta.primary_button]
    class = "bg-white text-neurokube-600 hover:bg-neurokube-200"
    background = "bg-white"
    text_color = "text-neurokube-600"
    hover = "hover:bg-neurokube-200"

#  [params.cta.secondary_button]
#    class = "border-white text-white hover:bg-neurokube-800"
#    text_color = "text-white"
#    hover = "hover:bg-neurokube-800"
#    border = "border-white"

# Section visibility toggles
[params.sections]
  testimonials = false
  clientLogos = false
  faq = true

# FAQ shortcode default style (see layouts/shortcodes/faq.html).
# One style for the whole site: same colors on every page that uses the
# faq shortcode (faq.md, offers.md...). Each field accepts one or more
# Tailwind classes; combine a light-mode class and a dark: variant in the
# same string, same convention as everywhere else in this file. A page can
# still override any of these via shortcode parameters for an exceptional
# case, but that should stay the exception, not the rule.
[params.faq]
  [params.faq.style]
    # Arrow in the menu + expand/collapse icons
    accent = "text-kube-600 dark:text-kube-600"
    # Bullet / number markers used inside the answers' lists
    marker = "marker:text-kube-600 dark:marker:text-kube-600"
    # Category nav text, inactive state
    menuText = "text-neurokube-600 dark:text-neurokube-600"
    # Category nav text, active state
    menuActiveText = "text-gray-900 dark:text-white"

# Callout shortcode default style (see layouts/shortcodes/sokube-callout.html).
# One style for the whole site, same convention as [params.faq.style] above.
# A page can still override any of these via shortcode parameters for an
# exceptional case (see the "full call" example in the shortcode's own
# doc comment).
[params.callout]
  [params.callout.style]
    # Section background
    background = "bg-gray-50 dark:bg-neurokube-800"
    # Description text
    description = "text-gray-600 dark:text-neurokube-200"
    # Primary button: background + text + hover
    primaryButton = "bg-neurokube-600 text-white hover:bg-neurokube-700"
    # Secondary button: background + text + border + hover
    secondaryButton = "bg-white dark:bg-neurokube-800 text-neurokube-600 dark:text-neurokube-100 hover:bg-neurokube-100 dark:hover:bg-neurokube-700 border-neurokube-600 dark:border-neurokube-400"

# Highlight-section shortcode default style (see layouts/shortcodes/sokube-highlight-section.html).
# One style for the whole site, same convention as [params.faq.style] above.
# A page can still override any of these via shortcode parameters for an
# exceptional case - background already is, on the "about" page.
[params.highlightSection]
  [params.highlightSection.style]
    # Section background (gradient)
    background = "bg-gradient-to-b from-blue-50 via-blue-50 to-white dark:from-neurokube-900 dark:via-neurokube-900 dark:to-neurokube-900"
    # Subtitle, right under the title
    subtitle = "text-gray-600 dark:text-neurokube-200"
    # Card background (the white/dark box holding card_title + .Inner)
    cardBackground = "bg-white dark:bg-neurokube-800"
    # Card border - only shown in dark mode (light mode uses a shadow instead, see the shortcode's template)
    cardBorder = "dark:border-neurokube-700"
    # Card body text (.Inner)
    cardText = "text-gray-600 dark:text-neurokube-200"

# Brand-heading style (see layouts/partials/brand-heading.html, used by both
# layouts/shortcodes/sokube-brand-heading.html and layouts/partials/
# trainings-extra-sections.html). One style for the whole site - every
# current call uses the default, but each can still override baseColor/
# accentColor on its own instance if needed.
[params.brandHeading]
  [params.brandHeading.style]
    # Plain (non-highlighted) part of the heading
    baseColor = "text-gray-900 dark:text-white"
    # *word*-wrapped part of the heading
    accentColor = "text-kube-600 dark:text-kube-600"

# Cards-section shortcode default style (see layouts/shortcodes/sokube-cards-section.html).
[params.cardsSection]
  [params.cardsSection.style]
    description = "text-gray-600 dark:text-neurokube-200"

# Features-section shortcode default style (see layouts/shortcodes/sokube-features-section.html).
[params.featuresSection]
  [params.featuresSection.style]
    description = "text-gray-600 dark:text-neurokube-200"

# Cta-image shortcode default style (see layouts/shortcodes/sokube-cta-image.html).
[params.ctaImage]
  [params.ctaImage.style]
    buttonBackground = "bg-kube-600 dark:bg-kube-600"
    buttonTextColor = "text-white dark:text-white"

# Client-logos shortcode default style (see layouts/shortcodes/sokube-client-logos.html).
# Toggle with [params.sections].clientLogos.
[params.clientLogos]
  [params.clientLogos.style]
    border = "border-gray-100 dark:border-neurokube-800"
    title = "dark:text-white"

# Stats-grid shortcode ([params.stats.<palette>], see layouts/shortcodes/
# sokube-stats-grid.html). Repeated-per-page component (several stat cards
# side by side) - works by named palettes, same convention as [params.cards]:
# the template only selects the requested palette and validates its
# existence (rule 8), it contains no color of its own.
[params.stats]
  grid_gap = "gap-8"

  [params.stats.default]
    background = "bg-white dark:bg-neurokube-800"
    border = "border-neurokube-200 dark:border-neurokube-700"
    value = "text-kube-600 dark:text-kube-300"
    label = "text-gray-700 dark:text-gray-300"

# Testimonials shortcode default style (see layouts/shortcodes/sokube-testimonials.html).
# Toggle with [params.sections].testimonials.
[params.testimonials]
  [params.testimonials.style]
    sectionBackground = "bg-gray-50 dark:!bg-neurokube-900"
    description = "text-gray-600 dark:text-neurokube-200"
    personTitle = "text-gray-600 dark:text-neurokube-200"
    quote = "text-gray-600 dark:text-neurokube-100"
    cardBackground = "bg-white dark:bg-neurokube-800"
    # Card border - only shown in dark mode (light mode uses a shadow instead)
    cardBorder = "dark:border-neurokube-700"

# Pricing Configuration
[params.pricing]
  currency = "CHF"

  [params.pricing.style]
    sectionBackground = "bg-white dark:bg-neurokube-900"
    card_background = "bg-neurokube-50 dark:bg-neurokube-800"
    card_border = "border-neurokube-300 dark:border-neurokube-700"
    featured_border = "border-neurokube-600 dark:border-neurokube-300"
    featured_shadow = "shadow-xl"
    icon_color = "text-neurokube-600 dark:text-neurokube-300"
    title_color = "text-gray-900 dark:text-white"
    description_color = "text-gray-500 dark:text-neurokube-200"
    price_color = "text-gray-900 dark:text-white"

# Cards Configuration
[params.cards]
  grid_gap = "gap-8"

  # Palette existante — inchangée, reste le comportement par défaut
  [params.cards.default]
    background = "bg-gradient-to-br from-neurokube-100 to-neurokube-50 dark:from-neurokube-900 dark:to-neurokube-800"
    border = "border-neurokube-300 dark:border-neurokube-400"
    hover_border = "hover:border-neurokube-600 dark:hover:border-neurokube-400"
    label = "text-neurokube-600 dark:text-neurokube-300"
    title = "text-neurokube-900 dark:text-white"
    text = "text-gray-700 dark:text-gray-300"
    marker = "marker:text-neurokube-600 dark:marker:text-neurokube-300"

  # Nouvelle palette KUBE (ex: cartes "PROBLEME" de la page About)
  [params.cards.kube]
    background = "bg-gradient-to-br from-kube-100 to-kube-50 dark:from-kube-900 dark:to-kube-800"
    border = "border-kube-300 dark:border-kube-400"
    hover_border = "hover:border-kube-600 dark:hover:border-kube-400"
    label = "text-kube-600 dark:text-kube-300"
    title = "text-kube-900 dark:text-white"
    text = "text-gray-700 dark:text-gray-300"
    marker = "marker:text-kube-600 dark:marker:text-kube-300"

  # Nouvelle palette HR (réutilisable ailleurs si besoin)
  [params.cards.hr]
    background = "bg-gradient-to-br from-hr-100 to-hr-50 dark:from-hr-900 dark:to-hr-800"
    border = "border-hr-300 dark:border-hr-400"
    hover_border = "hover:border-hr-600 dark:hover:border-hr-400"
    label = "text-hr-600 dark:text-hr-300"
    title = "text-hr-900 dark:text-white"
    text = "text-gray-700 dark:text-gray-300"
    marker = "marker:text-hr-600 dark:marker:text-hr-300"

# Forms Configuration
[params.forms]

  [params.forms.style]
    container = "max-w-3xl mx-auto"
    input = "w-full rounded-xl border border-gray-300 dark:border-neurokube-700 dark:bg-neurokube-900 dark:text-white px-4 py-3"
    label = "block text-sm font-medium mb-2 text-gray-700 dark:text-neurokube-100"
    button = "btn btn-primary w-full"
    # Label of a sokube-form-checkbox field
    checkboxLabel = "text-sm text-gray-600 dark:text-neurokube-200"
    # The "*" marker next to a required field's label (sokube-form-field, sokube-form-textarea)
    requiredColor = "text-kube-600 dark:text-kube-600"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.80.0"

[build]
  writeStats = true

[build.buildStats]
  enable = true

[security.funcs]
  getenv = ['^HUGO_', '^CI$']

[security.node.permissions]
  disable = true

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = true
    codeFences = true
    guessSyntax = true
    lineNumbersInTable = true
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2

