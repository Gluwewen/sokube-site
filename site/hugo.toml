baseURL = "https://www.sokube.io/"
title = "SoKube"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# Theme Config
# theme = "../.."
theme = "hugo-saasify-theme"

# Enable emoji support
enableEmoji = true

# Enable Git info for lastmod
enableGitInfo = true

# Enable taxonomies
[taxonomies]
  category = 'categories'
  tag = 'tags'

# Pagination
[pagination]
  pagerSize = 6
  path = "page"

[params]
  description = ""
  author = "Vincent Loiseau"
  # Google Analytics ID (e.g., "G-XXXXXXXXXX")
  # googleAnalytics = "G-XXXXXXXXXX"
  
  # Dark/Light mode toggling
  [params.appearance]
    defaultAppearance = "light"
    autoSwitchAppearance = true
    disableSwitch = false 

  # Social Media Links
  [params.social]
    linkedin = "https://www.linkedin.com/company/sokube"
    # twitter = "https://x.com/sokube_io"
    # bluesky = "https://bsky.app/profile/bsky.app"
    # youtube = "https://youtube.com/@chaomingli"
    # facebook = "https://facebook.com/lichaoming"
    # instagram = "https://instagram.com/lichaoming"
    # github = "https://github.com/chaoming"
    # telegram = "https://t.me/yourchannel"
    # discord = "https://discord.gg/yourinvite"
    # slack = "https://yourteam.slack.com"
    # medium = "https://medium.com/@yourhandle"
    # dribbble = "https://dribbble.com/yourprofile"
    # behance = "https://behance.net/yourprofile"
  
  # Footer Configuration
  [params.footer]
    # Column names
    column_1_title = "Features"
    column_2_title = "ABOUT"
    column_3_title = "LEGAL"

    [params.footer.logo]
    # Logo configuration
      # src = "/images/logo_fond-clair.svg"
      # dark_src = "/images/logo_fond-sombre.svg"
      src = "/images/logo_sk_bleu_rose.png"
      dark_src = "/images/logo_sk_blanc_rose_tr.png"
    
    [params.footer.style]
      background = "bg-neurokube-200 dark:bg-neurokube-900"
      border = "border-neurokube-50 dark:border-neurokube-800"
      title = "text-neurokube-900 dark:text-white"
      text = "text-neurokube-900 dark:text-neurokube-100"
      link = "text-neurokube-800 hover:text-neurokube-600 dark:text-neurokube-100 dark:hover:text-neurokube-300"
      social = "text-neurokube-400 hover:text-neurokube-600 dark:text-neurokube-300 dark:hover:text-neurokube-100"
      copyright = "text-neurokube-900 dark:text-neurokube-100"
      designer = "text-neurokube-900 hover:text-neurokube-600 dark:text-neurokube-100 dark:hover:text-neurokube-300"
  
  # Header Configuration
  [params.header]
    # Header background and border styles (optional)
    background = "bg-neurokube-900"
    border = "border-neurokube-900"
    
    # Logo configuration
    [params.header.logo]
      # src = "/images/logo_fond-sombre.svg"
      src = "/images/logo_sk_blanc_rose_tr.png"
      textClass = "text-neurokube-100"
    
    # Menu configuration
    [params.header.menu]
      spacing = "space-x-8"
      linkClass = "text-base text-neurokube-100 hover:text-neurokube-200 font-bold transition duration-200"
      
      # Dropdown menu configuration
      [params.header.menu.dropdown]
        width = "w-72"
        container_padding = "py-6"
        item_padding = "px-8 py-3"
        background = "bg-white dark:bg-neurokube-900"
        border = "border border-gray-100 dark:border-neurokube-800"
        shadow = "shadow-xl"
        radius = "rounded-lg"
        text_color = "text-gray-700 dark:text-neurokube-100"
        hover_background = "hover:bg-gray-50 dark:hover:bg-neurokube-800"
        text_size = "text-sm"
    
#     # Button configuration
#     [params.header.buttons]
#     # Sign In button
#     [params.header.buttons.signIn]
#       text = "Sign in"
#       url = "/signin"
      
#     # Get Started button
#     [params.header.buttons.getStarted]
#       text = "Get Started"
#       url = "/get-started"

# Blog configuration
  [params.blog]
    enable = true
    title = "Find all our news through our articles, case studies …"
    subtitle = """
**Discover our blog**.

We are excited to share our latest blog posts with you.
Whether you are looking for interviews, analysis or technological advances, we have something for you!
We hope you enjoy reading all our articles as much as we enjoyed creating them for you!
Read on to find out how the Cloud Native can expand your development horizons.
"""

    # Layout configuration (read by layouts/partials/blog-section-config.html)
    [params.blog.layout]
      # Number of columns in the article grid (list page). 1, 2 or 3.
      columns = 3
      # Whether single-post pages show the right-hand sidebar (2 columns)
      # or the article takes the full width (1 column).
      sidebarEnable = true
      # When true, the single-post header image uses the "featured_image_banner"
      # front matter field (falling back to "featured_image" if not set) and is
      # displayed as a fixed-height, cropped banner instead of its natural
      # (often very tall) size. The list-page thumbnail always keeps using
      # "featured_image" regardless of this setting. See layouts/_default/single.html.
      bannerImageEnable = false

    # Article header info (single post page): reading time, publication
    # date and tags. See layouts/partials/post-meta.html.
    [params.blog.postMeta]
      enable = true

    # Blog CTA configuration
    [params.blog.cta]
      enable = false  # Enable/disable CTA in blog posts

    # Category filter pills configuration (blog list page).
    # Each field accepts one or more Tailwind classes; combine a light-mode
    # class and a dark: variant in the same string (e.g. "bg-neurokube-900
    # dark:bg-neurokube-100"). If you introduce a class combination that
    # doesn't otherwise appear in the project, add it to the safelist in
    # tailwind.config.js so it isn't purged from the compiled CSS.
    [params.blog.categoryFilter]
      # The currently active pill (e.g. "All" by default, or the clicked category)
      [params.blog.categoryFilter.selected]
        background = "bg-neurokube-900 dark:bg-neurokube-100"
        text = "text-white dark:text-neurokube-900"
        hover_background = "hover:bg-neurokube-800 dark:hover:bg-neurokube-200"
        hover_text = "hover:text-white dark:hover:text-neurokube-900"

      # The inactive pills
      [params.blog.categoryFilter.unselected]
        background = "bg-transparent dark:bg-transparent"
        text = "text-neurokube-900 dark:text-neurokube-100"
        hover_background = "hover:bg-neurokube-100 dark:hover:bg-neurokube-800"
        hover_text = "hover:text-neurokube-900 dark:hover:text-white"

    # Category badge configuration (the pill overlaid on top of an article's
    # featured image in post cards). Same rules as [params.blog.categoryFilter]
    # above: combine light + dark: classes in the same string, and add any
    # brand-new class combination to the tailwind.config.js safelist.
    [params.blog.categoryBadge]
      background = "bg-neurokube-900 dark:bg-neurokube-100"
      text = "text-white dark:text-neurokube-900"
      hover_background = "hover:bg-neurokube-800 dark:hover:bg-neurokube-200"
      hover_text = "hover:text-white dark:hover:text-neurokube-900"

    # Post card configuration (article cards on the blog list page).
    # Same rules as [params.blog.categoryFilter] above: combine light + dark:
    # classes in the same string, and add any brand-new class combination to
    # the tailwind.config.js safelist.
    [params.blog.postCard]
      # Card background
      background = "bg-white dark:bg-neurokube-800"

      # Title
      title_text = "text-neurokube-900 dark:text-white"
      title_hover_text = "hover:text-neurokube-600 dark:hover:text-neurokube-300"

      # All other text and inline icons in the card (description, author,
      # date, "Read More" link, reading time)
      text = "text-gray-600 dark:text-neurokube-300"

    # Sidebar configuration
    [params.blog.sidebar]
      # Back to Articles button (top of sidebar)
      [params.blog.sidebar.backToArticles]
        enable = true

      # Recent articles section
      [params.blog.sidebar.recent]
        enable = true
        title = "Recent Articles"
        count = 5
      
      # Categories section
      [params.blog.sidebar.categories]
        enable = true
        title = "Categories"
      
      # Tags section
      [params.blog.sidebar.tags]
        enable = false
        title = "Popular Tags"
        count = 20

      # Subscribe form section
      [params.blog.sidebar.subscribe]
        enable = true
        title = "Subscribe to Newsletter"
        description = "Get the latest posts delivered right to your inbox"
        action = "https://formspree.io/f/your-form-id"
        emailName = "email"
        buttonText = "Subscribe"
        placeholder = "Enter your email"
        disclaimer = "We respect your privacy. Unsubscribe at any time."

# Trainings configuration.
# Mirrors [params.blog] above so the /trainings/ section (which reuses the
# same list/single/sidebar templates) can be toggled independently.
# Values below match the current blog defaults, so nothing changes visually
# until you edit this block. See layouts/partials/blog-section-config.html
# for how the right block is picked based on the page's section.
  [params.trainings]
    enable = true
    title = "Our DevOps, DevSecOps, Cloud and Agile Training Courses: Delivered by experts, tailored to your needs and customizable, on-site, in French or English!"
    subtitle = """Designed and delivered by seasoned experts in [DevOps](/site/content/en-us/offers/sonative-devops.md), [Agile](/site/content/en-us/offers/sonative-agile.md), [Cloud Native Applications](/site/content/en-us/offers/sonative-app.md), and [Cloud](/site/content/en-us/offers/sonative-cloud.md), our training courses are aimed at providing you with the skills and knowledge you need to succeed in your projects and day-to-day responsibilities.

🌟 **Experienced specialist consultants:** Our instructors are industry experts with extensive hands-on experience. They bring cutting-edge knowledge directly from server rooms and development teams into the classroom.

🧩 **Customizable courses:** We understand that every organization is unique. That is why our courses can be tailored to your specific needs and context, providing unmatched flexibility and relevance.

🏢 **On-site delivery:** Our instructor-led, in-person training approach—either at your premises or ours—encourages direct interaction with trainers and peers, creating an immersive and collaborative learning environment.

🇫🇷 / 🇬🇧 **Training in French and English:** We offer all our training courses in either French or English to best meet your needs and support multilingual and mixed-language teams.

📚/ ⚙️ **Hands-on learning:** Our training programs combine theory and practice through labs and demonstrations, with a strong focus on practical skills that can be applied immediately in real-world situations.

    """

    # Layout configuration
    [params.trainings.layout]
      columns = 3
      sidebarEnable = false
      # See the comment on params.blog.layout.bannerImageEnable above.
      bannerImageEnable = true

    # Article header info (single training page): reading time, publication
    # date and tags.
    [params.trainings.postMeta]
      enable = false

    # Trainings CTA configuration
    [params.trainings.cta]
      enable = false

    # Category filter pills configuration (trainings list page).
    [params.trainings.categoryFilter]
      [params.trainings.categoryFilter.selected]
        background = "bg-neurokube-900 dark:bg-neurokube-100"
        text = "text-white dark:text-neurokube-900"
        hover_background = "hover:bg-neurokube-800 dark:hover:bg-neurokube-200"
        hover_text = "hover:text-white dark:hover:text-neurokube-900"

      [params.trainings.categoryFilter.unselected]
        background = "bg-transparent dark:bg-transparent"
        text = "text-neurokube-900 dark:text-neurokube-100"
        hover_background = "hover:bg-neurokube-100 dark:hover:bg-neurokube-800"
        hover_text = "hover:text-neurokube-900 dark:hover:text-white"

    # Category badge configuration (pill overlaid on the featured image).
    [params.trainings.categoryBadge]
      background = "bg-neurokube-900 dark:bg-neurokube-100"
      text = "text-white dark:text-neurokube-900"
      hover_background = "hover:bg-neurokube-800 dark:hover:bg-neurokube-200"
      hover_text = "hover:text-white dark:hover:text-neurokube-900"

    # Post card configuration (training cards on the trainings list page).
    [params.trainings.postCard]
      background = "bg-white dark:bg-neurokube-800"
      title_text = "text-neurokube-900 dark:text-white"
      title_hover_text = "hover:text-neurokube-600 dark:hover:text-neurokube-300"
      text = "text-gray-600 dark:text-neurokube-300"

    # Sidebar configuration
    [params.trainings.sidebar]
      [params.trainings.sidebar.backToArticles]
        enable = false

      [params.trainings.sidebar.recent]
        enable = false
        title = "Recent Articles"
        count = 5

      [params.trainings.sidebar.categories]
        enable = false
        title = "Categories"

      [params.trainings.sidebar.tags]
        enable = false
        title = "Popular Tags"
        count = 20

      [params.trainings.sidebar.subscribe]
        enable = false
        title = "Subscribe to Newsletter"
        description = "Get the latest posts delivered right to your inbox"
        action = "https://formspree.io/f/your-form-id"
        emailName = "email"
        buttonText = "Subscribe"
        placeholder = "Enter your email"
        disclaimer = "We respect your privacy. Unsubscribe at any time."

