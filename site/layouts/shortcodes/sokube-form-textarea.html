{{/*
    Form-textarea Shortcode

    Un champ <textarea> avec son <label>, à utiliser à l'intérieur d'un
    sokube-form.

    Site-wide : les styles par défaut vivent dans [params.forms.style]
    (hugo.toml), partagés par tout le groupe de shortcodes sokube-form-*.

    Paramètres :
      label         - texte du label
      name          - attribut "name" du champ
      rows          - nombre de lignes (défaut "5")
      placeholder   - texte d'exemple
      required      - "true"/"false" (défaut "false")
      requiredColor - couleur du "*" affiché si required="true"
                      (défaut: params.forms.style.requiredColor)

    Appel minimal :
      {{</* sokube-form-textarea label="Message" name="message" required="true" >}}
*/}}

{{ $style := site.Params.forms.style | default dict }}

{{ $input := $style.input }}
{{ $labelStyle := $style.label }}

{{ $required := .Get "required" }}
{{ $requiredColor := .Get "requiredColor" | default $style.requiredColor }}

<div>

    <label class="{{ $labelStyle }}">
        {{ .Get "label" }}{{ if eq $required "true" }}<sup class="{{ $requiredColor }}">*</sup>{{ end }}
    </label>

    <textarea
        name="{{ .Get "name" }}"
        rows="{{ .Get "rows" | default "5" }}"
        {{ if eq $required "true" }}required{{ end }}
        class="{{ $input }}"
        placeholder="{{ .Get "placeholder" }}"
    ></textarea>

</div>
